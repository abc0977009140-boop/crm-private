<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信用卡付款授權書 · 填寫</title>
<style>
  :root{
    --teal:#245A5E; --teal-deep:#19505A; --gold:#C9A95F; --cream:#FBF1D8;
    --bg:#FFF8F0; --line:#e7ddcb; --muted:#8a8270; --ink:#2a2a26;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:680px;margin:0 auto;padding:20px 16px 80px;}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .top h1{font-size:20px;margin:0;color:var(--teal);}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 20px;}

  .step{display:flex;align-items:center;gap:10px;margin:0 0 14px;}
  .step .num{width:30px;height:30px;border-radius:50%;background:var(--teal);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex:0 0 auto;}
  .step .t{font-size:17px;font-weight:700;color:var(--teal-deep);}

  .card{background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:6px 18px 18px;box-shadow:0 1px 3px rgba(0,0,0,.04);}

  /* 每一格欄位：各自一行，分開 */
  .field{padding:14px 0;border-bottom:1px dashed var(--line);}
  .field:last-child{border-bottom:none;}
  .field > label{display:block;font-size:13.5px;font-weight:600;color:var(--teal-deep);margin-bottom:7px;}
  .field .hint{font-size:12px;color:var(--muted);font-weight:400;}
  input[type=text]{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;font-family:inherit;background:#fff;color:var(--ink);}
  input[type=text]:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,95,.15);}
  input::placeholder{color:#bcb4a3;}

  /* 相同/不同 切換 */
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;padding:11px;border:1px solid var(--line);background:#fff;border-radius:10px;
    font-size:14.5px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;}
  .seg button.on{background:var(--teal);color:#fff;border-color:var(--teal);}

  /* 國籍勾選 */
  .checks{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .chk{display:flex;align-items:center;gap:6px;padding:9px 14px;border:1px solid var(--line);
    border-radius:10px;cursor:pointer;font-size:14.5px;user-select:none;background:#fff;}
  .chk.on{background:var(--cream);border-color:var(--gold);color:var(--teal-deep);font-weight:600;}
  .chk input{display:none;}
  #natlOtherTxt{flex:1;min-width:140px;}
  #natlOtherTxt[disabled]{background:#f4f1ea;color:#bbb;}

  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

  .nextnote{margin-top:18px;padding:14px 16px;background:#fff;border:1px dashed var(--gold);
    border-radius:12px;color:var(--muted);font-size:13.5px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>信用卡付款授權書 · 填寫</h1>
  </div>
  <p class="sub">台灣人壽 · 一格一格填，邊填邊存。</p>

  <div class="step"><div class="num">1</div><div class="t">要保人</div></div>

  <div class="card">

    <div class="field">
      <label>要保人與授權人是否相同</label>
      <div class="seg">
        <button id="seg-diff" class="on" onclick="setSame(false)">不同（分開填）</button>
        <button id="seg-same" onclick="setSame(true)">相同（要保人＝授權人）</button>
      </div>
    </div>

    <div class="field">
      <label>姓名 <span class="hint">（可搜尋已建立的客戶）</span></label>
      <input type="text" id="ph_name" list="clientNames" placeholder="輸入或搜尋客戶姓名" oninput="onNameInput()">
      <datalist id="clientNames"></datalist>
    </div>

    <div class="field">
      <label>身分證字號</label>
      <input type="text" id="ph_idno" placeholder="A123456789">
    </div>

    <div class="field">
      <label>國籍</label>
      <div class="checks">
        <label class="chk on" id="chk-tw"><input type="checkbox" checked onchange="pickNatl('tw')">中華民國</label>
        <label class="chk" id="chk-other"><input type="checkbox" onchange="pickNatl('other')">其他</label>
        <input type="text" id="natlOtherTxt" placeholder="國家名稱" disabled>
      </div>
    </div>

    <div class="field">
      <label>出生年 <span class="hint">（民國）</span></label>
      <input type="text" id="ph_by" placeholder="例：81">
    </div>

    <div class="field">
      <label>出生月</label>
      <input type="text" id="ph_bm" placeholder="例：12">
    </div>

    <div class="field">
      <label>出生日</label>
      <input type="text" id="ph_bd" placeholder="例：10">
    </div>

    <div class="field">
      <label>手機</label>
      <input type="text" id="ph_phone" placeholder="09xxxxxxxx">
    </div>

    <div class="field">
      <label>地址</label>
      <input type="text" id="ph_addr" placeholder="通訊地址">
    </div>

  </div>

  <div class="nextnote">這是第 1 格「要保人」。你看版面和操作 OK 後，再教我第 2 格要放什麼，我接著做。</div>
</div>

<script>
let cases=[];
try{cases=JSON.parse(localStorage.getItem('bhw_clients'))||[];}catch(e){cases=[];}

// 客戶姓名清單（給搜尋用）
(function(){
  const names=[...new Set(cases.map(c=>c.ph&&c.ph.name).filter(Boolean))];
  document.getElementById('clientNames').innerHTML=names.map(n=>`<option value="${esc(n)}"></option>`).join('');
})();

function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

function setVal(id,v){const e=document.getElementById(id);if(e)e.value=v||'';}

// 西元 → 民國（生日用）
function splitRoc(str){
  const p=String(str||'').split(/[^0-9]+/).filter(Boolean);
  let y=p[0]||'',m=p[1]||'',d=p[2]||'';
  if(y&&parseInt(y,10)>=1912)y=String(parseInt(y,10)-1911);
  return {y,m,d};
}

// 輸入姓名命中客戶 → 自動帶入
function onNameInput(){
  const v=document.getElementById('ph_name').value.trim();
  const c=cases.find(x=>x.ph&&x.ph.name===v);
  if(!c)return;
  const b=splitRoc(c.ph.birth);
  setVal('ph_idno',c.ph.idno);
  setVal('ph_by',b.y); setVal('ph_bm',b.m); setVal('ph_bd',b.d);
  setVal('ph_phone',c.ph.phone||c.ph.tel);
  setVal('ph_addr',c.ph.addr);
}

// 相同 / 不同
let phSameAuth=false;
function setSame(on){
  phSameAuth=on;
  document.getElementById('seg-same').classList.toggle('on',on);
  document.getElementById('seg-diff').classList.toggle('on',!on);
}

// 國籍 擇一
function pickNatl(which){
  const tw=document.getElementById('chk-tw'), other=document.getElementById('chk-other');
  const txt=document.getElementById('natlOtherTxt');
  const isOther=which==='other';
  tw.querySelector('input').checked=!isOther;
  other.querySelector('input').checked=isOther;
  tw.classList.toggle('on',!isOther);
  other.classList.toggle('on',isOther);
  txt.disabled=!isOther;
  if(!isOther)txt.value='';
}
</script>
</body>
</html>
