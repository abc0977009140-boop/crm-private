<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信用卡付款授權書 · 填寫</title>
<style>
  :root{
    --teal:#245A5E; --teal-deep:#19505A; --gold:#C9A95F; --cream:#FBF1D8;
    --bg:#FFF8F0; --line:#e7ddcb; --muted:#8a8270; --ink:#2a2a26;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:880px;margin:0 auto;padding:20px 16px 80px;}
  .top h1{font-size:20px;margin:0;color:var(--teal);}
  .sub{color:var(--muted);font-size:13.5px;margin:2px 0 20px;}
  .step{display:flex;align-items:center;gap:10px;margin:22px 0 12px;}
  .step .num{width:30px;height:30px;border-radius:50%;background:var(--teal);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex:0 0 auto;}
  .step .t{font-size:17px;font-weight:700;color:var(--teal-deep);}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .grid{display:grid;gap:14px 16px;}
  .g2{grid-template-columns:1fr 1fr;}
  .g3{grid-template-columns:1fr 1fr 1fr;}
  .full{grid-column:1/-1;}
  @media(max-width:620px){.g2,.g3{grid-template-columns:1fr 1fr;}}
  @media(max-width:430px){.g2,.g3{grid-template-columns:1fr;}}
  .field > label{display:block;font-size:13px;font-weight:600;color:var(--teal-deep);margin-bottom:6px;}
  .field .hint{font-size:12px;color:var(--muted);font-weight:400;}
  input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;font-family:inherit;background:#fff;color:var(--ink);}
  input[type=text]:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,95,.15);}
  input::placeholder{color:#bcb4a3;}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;padding:11px;border:1px solid var(--line);background:#fff;border-radius:10px;
    font-size:14.5px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;}
  .seg button.on{background:var(--teal);color:#fff;border-color:var(--teal);}
  .checks{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .chk{display:flex;align-items:center;gap:6px;padding:8px 13px;border:1px solid var(--line);
    border-radius:10px;cursor:pointer;font-size:14px;user-select:none;background:#fff;}
  .chk.on{background:var(--cream);border-color:var(--gold);color:var(--teal-deep);font-weight:600;}
  .chk input{display:none;}
  .natl-txt{min-width:130px;flex:1;}
  .natl-txt[disabled]{background:#f4f1ea;color:#bbb;}
  .grouplabel{font-size:13px;font-weight:600;color:var(--teal-deep);margin-bottom:7px;}
  .note-warn{font-size:12.5px;color:#b5663d;margin:4px 0 8px;}
  .subbox{border:1px solid var(--line);border-radius:12px;padding:14px;background:#fbf9f4;margin-top:4px;}
  .subbox-title{font-size:13px;font-weight:700;color:var(--teal-deep);margin-bottom:10px;}
  #authCard{display:none;}
  .nextnote{margin-top:18px;padding:14px 16px;background:#fff;border:1px dashed var(--gold);
    border-radius:12px;color:var(--muted);font-size:13.5px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>信用卡付款授權書 · 填寫</h1></div>
  <p class="sub">台灣人壽 · 邊填邊存</p>

  <div class="step"><div class="num">1</div><div class="t">要保人</div></div>
  <div class="card">
    <div class="grid">
      <div class="field full">
        <label>要保人與授權人是否相同</label>
        <div class="seg">
          <button id="seg-diff" class="on" onclick="setSame(false)">不同（分開填授權人）</button>
          <button id="seg-same" onclick="setSame(true)">相同（要保人＝授權人）</button>
        </div>
      </div>
    </div>
    <div class="grid g2" style="margin-top:14px">
      <div class="field">
        <label>姓名 <span class="hint">（可搜尋客戶）</span></label>
        <input type="text" id="ph_name" list="clientNames" placeholder="輸入或搜尋客戶姓名" oninput="onNameInput()">
        <datalist id="clientNames"></datalist>
      </div>
      <div class="field"><label>身分證字號</label><input type="text" id="ph_idno" placeholder="A123456789"></div>
      <div class="field full">
        <label>國籍</label>
        <div class="checks">
          <label class="chk on" id="ph-natl-tw"><input type="checkbox" checked onchange="pickNatl('ph','tw')">中華民國</label>
          <label class="chk" id="ph-natl-other"><input type="checkbox" onchange="pickNatl('ph','other')">其他</label>
          <input type="text" id="ph_natl_txt" class="natl-txt" placeholder="國家名稱" disabled>
        </div>
      </div>
      <div class="field"><label>出生年 <span class="hint">（民國）</span></label><input type="text" id="ph_by" placeholder="例：81"></div>
      <div class="field"><label>出生月</label><input type="text" id="ph_bm" placeholder="12"></div>
      <div class="field"><label>出生日</label><input type="text" id="ph_bd" placeholder="10"></div>
      <div class="field"><label>手機</label><input type="text" id="ph_phone" placeholder="09xxxxxxxx"></div>
      <div class="field full"><label>地址</label><input type="text" id="ph_addr" placeholder="通訊地址"></div>
    </div>
  </div>

  <div id="authStep" class="step" style="display:none"><div class="num">2</div><div class="t">授權人</div></div>
  <div id="authCard" class="card">
    <div class="grid g2">
      <div class="field"><label>姓名 <span class="hint">（可選被保人／其他客戶，或直接打字）</span></label>
        <input type="text" id="au_name" list="authNames" placeholder="點此選被保人或輸入" oninput="onAuName()">
        <datalist id="authNames"></datalist>
      </div>
      <div class="field"><label>身分證字號</label><input type="text" id="au_idno" placeholder="A123456789"></div>
      <div class="field full">
        <label>國籍</label>
        <div class="checks">
          <label class="chk on" id="au-natl-tw"><input type="checkbox" checked onchange="pickNatl('au','tw')">中華民國</label>
          <label class="chk" id="au-natl-other"><input type="checkbox" onchange="pickNatl('au','other')">其他</label>
          <input type="text" id="au_natl_txt" class="natl-txt" placeholder="國家名稱" disabled>
        </div>
      </div>
      <div class="field"><label>出生年 <span class="hint">（民國）</span></label><input type="text" id="au_by" placeholder="例：81"></div>
      <div class="field"><label>出生月</label><input type="text" id="au_bm" placeholder="12"></div>
      <div class="field"><label>出生日</label><input type="text" id="au_bd" placeholder="10"></div>
      <div class="field"><label>行動電話</label><input type="text" id="au_phone" placeholder="09xxxxxxxx"></div>
    </div>

    <div style="margin-top:16px">
      <div class="grouplabel">授權人身分 <span class="hint">（擇一）</span></div>
      <div class="checks">
        <label class="chk" id="ident-ph"><input type="checkbox" onchange="pickOne('ident','ph')">要保人</label>
        <label class="chk" id="ident-ins"><input type="checkbox" onchange="pickOne('ident','ins')">被保險人</label>
        <label class="chk" id="ident-ben"><input type="checkbox" onchange="pickOne('ident','ben')">受益人</label>
      </div>
      <div class="note-warn">※若非要保人、被保險人及受益人時需檢附關係證明。</div>
    </div>

    <div style="margin-top:6px">
      <div class="grouplabel">要保人／被保險人之關係 <span class="hint">（擇一）</span></div>
      <div class="checks">
        <label class="chk" id="rel-spouse"><input type="checkbox" onchange="pickOne('rel','spouse')">配偶</label>
        <label class="chk" id="rel-child"><input type="checkbox" onchange="pickOne('rel','child')">子女</label>
        <label class="chk" id="rel-parent"><input type="checkbox" onchange="pickOne('rel','parent')">父母</label>
        <label class="chk" id="rel-gp"><input type="checkbox" onchange="pickOne('rel','gp')">(外)祖父母</label>
        <label class="chk" id="rel-sib"><input type="checkbox" onchange="pickOne('rel','sib')">兄弟姐妹</label>
        <label class="chk" id="rel-legal"><input type="checkbox" onchange="pickOne('rel','legal')">法定代理人/監護人/輔助人</label>
      </div>
    </div>

    <div class="subbox" style="margin-top:16px">
      <div class="subbox-title">法定代理人／監護人／輔助人</div>
      <div class="note-warn">※如授權人未成年或已受監護宣告／輔助宣告尚未撤銷者，需提供以下資訊。</div>
      <div class="grid g2">
        <div class="field"><label>姓名</label><input type="text" id="lr_name"></div>
        <div class="field"><label>身分證統一編號</label><input type="text" id="lr_idno"></div>
        <div class="field"><label>行動電話</label><input type="text" id="lr_phone"></div>
        <div class="field"><label>生日 <span class="hint">（民國）</span></label><input type="text" id="lr_birth" placeholder="例：81/12/10"></div>
      </div>
    </div>
  </div>

  <div class="nextnote">第 1、2 格先這樣。OK 後再教我第 3 格（繳費別／信用卡…）要怎麼放。</div>
</div>

<script>
let cases=[];
let currentCase=null;
try{cases=JSON.parse(localStorage.getItem('bhw_clients'))||[];}catch(e){cases=[];}
(function(){
  const names=[...new Set(cases.map(c=>c.ph&&c.ph.name).filter(Boolean))];
  document.getElementById('clientNames').innerHTML=names.map(n=>'<option value="'+esc(n)+'"></option>').join('');
  buildAuthNames();
})();
function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function setVal(id,v){const e=document.getElementById(id);if(e)e.value=v||'';}
function splitRoc(str){
  const p=String(str||'').split(/[^0-9]+/).filter(Boolean);
  let y=p[0]||'',m=p[1]||'',d=p[2]||'';
  if(y&&parseInt(y,10)>=1912)y=String(parseInt(y,10)-1911);
  return {y,m,d};
}
function onNameInput(){
  const v=document.getElementById('ph_name').value.trim();
  const c=cases.find(x=>x.ph&&x.ph.name===v);
  currentCase=c||null;
  buildAuthNames();
  if(!c)return;
  const b=splitRoc(c.ph.birth);
  setVal('ph_idno',c.ph.idno);
  setVal('ph_by',b.y);setVal('ph_bm',b.m);setVal('ph_bd',b.d);
  setVal('ph_phone',c.ph.phone||c.ph.tel);
  setVal('ph_addr',c.ph.addr);
}
function buildAuthNames(){
  const list=document.getElementById('authNames');
  let opts=[];
  if(currentCase){
    (currentCase.insureds||[]).forEach(ins=>{
      if(ins.name)opts.push('<option value="'+esc(ins.name)+'">被保人'+(ins.rel?'（'+esc(ins.rel)+'）':'')+'</option>');
    });
  }
  // 其他客戶
  cases.forEach(c=>{
    if(c.ph&&c.ph.name)opts.push('<option value="'+esc(c.ph.name)+'">其他客戶</option>');
  });
  list.innerHTML=opts.join('');
}
function onAuName(){
  const v=document.getElementById('au_name').value.trim();
  if(!v)return;
  // 先找目前客戶的被保人
  let p=null;
  if(currentCase)p=(currentCase.insureds||[]).find(x=>x.name===v)||null;
  // 再找其他客戶（要保人）
  if(!p){const c=cases.find(x=>x.ph&&x.ph.name===v);if(c)p=c.ph;}
  if(!p)return; // 其他：手動打字，不覆蓋
  const b=splitRoc(p.birth);
  setVal('au_idno',p.idno);
  setVal('au_by',b.y);setVal('au_bm',b.m);setVal('au_bd',b.d);
  setVal('au_phone',p.phone||p.tel||'');
}
let phSameAuth=false;
function setSame(on){
  phSameAuth=on;
  document.getElementById('seg-same').classList.toggle('on',on);
  document.getElementById('seg-diff').classList.toggle('on',!on);
  document.getElementById('authStep').style.display=on?'none':'flex';
  document.getElementById('authCard').style.display=on?'none':'block';
}
function pickNatl(who,which){
  const tw=document.getElementById(who+'-natl-tw'), other=document.getElementById(who+'-natl-other');
  const txt=document.getElementById(who+'_natl_txt');
  const isOther=which==='other';
  tw.querySelector('input').checked=!isOther;
  other.querySelector('input').checked=isOther;
  tw.classList.toggle('on',!isOther);
  other.classList.toggle('on',isOther);
  txt.disabled=!isOther;
  if(!isOther)txt.value='';
}
const groups={ident:['ph','ins','ben'],rel:['spouse','child','parent','gp','sib','legal']};
function pickOne(group,key){
  // 授權人身分 + 關係 視為同一組，全部互斥（只能擇一）
  ['ident','rel'].forEach(g=>{
    groups[g].forEach(k=>{
      const el=document.getElementById(g+'-'+k);
      const on=(g===group&&k===key);
      el.querySelector('input').checked=on;
      el.classList.toggle('on',on);
    });
  });
}
</script>
</body>
</html>
