<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>套印位置校正 · 保險白話文</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--teal:#245A5E;--teal-deep:#19505A;--gold:#C9A95F;--bg:#FFF8F0;--line:#e7ddcb;--muted:#8a8270;--ink:#2a2a26;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;line-height:1.55;-webkit-user-select:none;user-select:none;}
  .wrap{max-width:980px;margin:0 auto;padding:14px 12px 40px;}
  h1{font-size:19px;margin:4px 0 2px;color:var(--teal-deep);}
  .sub{font-size:13px;color:var(--muted);margin-bottom:10px;}
  .tabs{display:flex;gap:8px;margin-bottom:10px;}
  .tab{flex:1;padding:9px;border:1px solid var(--line);border-radius:9px;background:#fff;text-align:center;font-weight:700;font-size:15px;cursor:pointer;color:var(--muted);}
  .tab.on{background:var(--teal);color:#fff;border-color:var(--teal);}
  .hint{font-size:12.5px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:10px;}
  .stage{position:relative;width:100%;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff;}
  .stage img{display:block;width:100%;pointer-events:none;}
  #layer{position:absolute;left:0;top:0;width:100%;height:100%;}
  .mk{position:absolute;white-space:nowrap;color:#fff;font-weight:700;line-height:1.1;cursor:grab;
      padding:3px 6px;border-radius:6px;touch-action:none;transform-origin:left top;
      background:#1565c0;box-shadow:0 1px 3px rgba(0,0,0,.3);min-width:18px;text-align:center;}
  .mk.cell{background:#2e7d32;}
  .mk.on{background:#e53935;outline:2px solid #b71c1c;z-index:5;}
  .mk:active{cursor:grabbing;}
  .bar{position:sticky;bottom:0;background:rgba(255,248,240,.97);border-top:1px solid var(--line);padding:10px 8px;margin:0 -12px;}
  .cur{font-size:13.5px;font-weight:700;color:var(--teal-deep);text-align:center;margin-bottom:6px;min-height:18px;}
  .steprow{display:flex;gap:6px;justify-content:center;margin:6px 0;align-items:center;}
  .steprow .lbl{font-size:13px;color:var(--muted);}
  .chip{padding:6px 12px;border:1px solid var(--line);border-radius:20px;background:#fff;font-size:13px;cursor:pointer;}
  .chip.on{background:var(--gold);color:#3a2f15;border-color:var(--gold);font-weight:700;}
  .pad{display:grid;grid-template-columns:repeat(3,42px);grid-template-rows:repeat(3,38px);gap:5px;justify-content:center;margin:6px auto;}
  .pad button{font-size:18px;border:1px solid var(--line);border-radius:9px;background:#fff;cursor:pointer;}
  .pad .mid{visibility:hidden;}
  .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
  .actions button{padding:10px 14px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
  .save{background:var(--teal);color:#fff;}.copy{background:var(--gold);color:#3a2f15;}
  .reset{background:#fff;color:#b56b3d;border:1px solid var(--line)!important;}
  .msg{font-size:13px;color:var(--teal-deep);text-align:center;margin-top:8px;min-height:18px;}
  a.back{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:9px;padding:6px 12px;font-size:14px;color:var(--teal-deep);text-decoration:none;margin-bottom:8px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="auth.html">← 回填寫頁</a>
  <h1>套印位置校正 <span style="font-size:12px;color:#b56b3d;font-weight:400">v5</span></h1>
  <div class="sub">用手指／滑鼠「直接拖」表單上的字到正確格子 → 按儲存。要微調可選下方方向鍵。</div>

  <div class="tabs">
    <div class="tab on" id="tab-globallife" onclick="switchIns('globallife')">全球人壽</div>
    <div class="tab" id="tab-taiwanlife" onclick="switchIns('taiwanlife')">台灣人壽</div>
  </div>
  <div class="hint" id="hint">藍色字＝可拖。抓住直接拖到位；被選到的會變紅色。台灣人壽是「整體位移」（拖中間那塊，全部一起移）。</div>

  <div class="stage" id="stage">
    <img id="bg" alt="表單">
    <div id="layer"></div>
  </div>

  <div class="bar">
    <div class="cur" id="cur">尚未選取</div>
    <div class="steprow"><span class="lbl">微調步幅</span>
      <span class="chip" data-s="0.0005">細</span>
      <span class="chip on" data-s="0.002">中</span>
      <span class="chip" data-s="0.008">粗</span>
    </div>
    <div class="pad">
      <button class="mid"></button><button onclick="nudge(0,-1)">↑</button><button class="mid"></button>
      <button onclick="nudge(-1,0)">←</button><button class="mid"></button><button onclick="nudge(1,0)">→</button>
      <button class="mid"></button><button onclick="nudge(0,1)">↓</button><button class="mid"></button>
    </div>
    <div class="actions">
      <button class="save" onclick="save()">💾 儲存校正</button>
      <button class="reset" onclick="resetOne()">↩ 還原此欄</button>
      <button class="reset" onclick="resetAll()">↩ 全部還原</button>
      <button class="copy" onclick="copyJSON()">📋 複製座標</button>
    </div>
    <div class="msg" id="msg"></div>
    <textarea id="out" readonly style="display:none;width:100%;height:70px;margin-top:8px;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:8px;background:#fff;color:#333;-webkit-user-select:all;user-select:all;"></textarea>
  </div>
</div>

const PW=595.4,PH=841.9,FONTPT=10.5;

const stage=$('stage'),img=$('bg'),layer=$('layer');

function load(){try{over=JSON.parse(localStorage.getItem('bhw_coords_'+ins)||'{}');}catch(e){over={};}}
function pointFields(){return ins==='globallife'?Object.keys(GL_DEF):[];}
function cellFields(){return ins==='globallife'?Object.keys(GL_CELLS):[];}
function getP(k){const d=GL_DEF[k],v=over[k]||{};return {nx:(v.nx!=null?v.nx:d[0]),ny:(v.ny!=null?v.ny:d[1]),center:d[2]};}
function getOff(k){const v=over[k]||{};return {dx:(v.dx||0),dy:(v.dy||0)};}
function round(n){return Math.round(n*10000)/10000;}
function W(){return stage.clientWidth;}
function H(){return W()*PH/PW;}

function build(){
  layer.innerHTML=''; layer.style.height=H()+'px';
  const fpx=FONTPT*W()/PW;
  if(ins==='taiwanlife'){
    const el=document.createElement('div'); el.className='mk on'; el.dataset.k='_shift';
    el.textContent='台灣人壽·整體位移（拖我）'; el.style.fontSize=fpx+'px';
    el.style.left='50%'; el.style.top='50%'; el.style.transform='translate(-50%,-50%)';
    attachDrag(el,'_shift'); layer.appendChild(el); active='_shift'; updateCur(); return;
  }
  pointFields().forEach(k=>{
    const p=getP(k); const el=document.createElement('div');
    el.className='mk'+(active===k?' on':''); el.dataset.k=k;
    el.textContent=GL_SAMPLE[k]; el.style.fontSize=fpx+'px';
    el.style.left=(p.nx*100)+'%'; el.style.top=(p.ny*100)+'%';

  cellFields().forEach(k=>{

    el.className='mk cell'+(active===k?' on':''); el.dataset.k=k;

    el.style.letterSpacing=Math.max(0,pitch-fpx*0.62)+'px';
    el.textContent=cf.sample; el.style.fontSize=fpx+'px';
    el.style.left=((cf.cells[0]/PW)+o.dx)*100+'%';

function reposition(){

}

function attachDrag(el,k){
  el.addEventListener('pointerdown',ev=>{

      const ddx=(e.clientX-sx)/w, ddy=(e.clientY-sy)/h;
      if(k==='_shift'){over._shift={dx:round(start.dx+ddx),dy:round(start.dy+ddy)};}
      else if(GL_DEF[k]){const v=over[k]||{};v.nx=round(start.nx+ddx);v.ny=round(start.ny+ddy);over[k]=v;}
      else {const v=over[k]||{};v.dx=round(start.dx+ddx);v.dy=round(start.dy+ddy);over[k]=v;}
      if(k==='_shift'){updateCur();} else {reposition();}
    };
    const up=()=>{el.removeEventListener('pointermove',move);el.removeEventListener('pointerup',up);el.removeEventListener('pointercancel',up);};
    el.addEventListener('pointermove',move);
    el.addEventListener('pointerup',up);
    el.addEventListener('pointercancel',up);
  });
}

function nudge(ix,iy){
  if(!active){flash('先選一個欄位（點一下表單上的字）');return;}
  if(active==='_shift'){const s=over._shift||{dx:0,dy:0};over._shift={dx:round(s.dx+ix*step),dy:round(s.dy+iy*step)};updateCur();return;}
  if(GL_DEF[active]){const p=getP(active);const v=over[active]||{};v.nx=round(p.nx+ix*step);v.ny=round(p.ny+iy*step);over[active]=v;}
  else if(GL_CELLS[active]){const o=getOff(active);const v=over[active]||{};v.dx=round(o.dx+ix*step);v.dy=round(o.dy+iy*step);over[active]=v;}
  reposition();
}

function switchIns(k){
  ins=k;active=null;
  $('tab-globallife').classList.toggle('on',k==='globallife');
  $('tab-taiwanlife').classList.toggle('on',k==='taiwanlife');
  load();
  img.onload=build; img.onerror=build; img.src='data:image/jpeg;base64,'+BG[k];
  if(img.complete)build();
}
function save(){
  if(ins==='globallife'){Object.keys(over).forEach(k=>{
    if(GL_DEF[k]){const d=GL_DEF[k],v=over[k];if(v.nx===d[0]&&v.ny===d[1])delete over[k];}
    if(GL_CELLS[k]){const v=over[k];if(!v.dx&&!v.dy)delete over[k];}});}
  localStorage.setItem('bhw_coords_'+ins,JSON.stringify(over));
  flash('已儲存 ✓ 回填寫頁下載即用新位置');
}
function resetOne(){if(!active){flash('先選欄位');return;}delete over[active];build();flash('已還原此欄');}
function resetAll(){over={};localStorage.removeItem('bhw_coords_'+ins);build();flash('已全部還原');}
function copyJSON(){
  const t=JSON.stringify(over,null,0);
  const box=$('out'); box.style.display='block'; box.value=t;
  try{box.focus();box.select();}catch(e){}
  // try clipboard too (works on deployed site)
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(()=>flash('已複製，也已顯示下方→可截圖給小阿姨'),()=>flash('已顯示下方 → 截圖這串給小阿姨'));}
  else flash('已顯示下方 → 截圖這串給小阿姨');
}
function flash(m){$('msg').textContent=m;clearTimeout(flash._t);flash._t=setTimeout(()=>$('msg').textContent='',3000);}

document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');step=parseFloat(c.dataset.s);});
window.addEventListener('resize',()=>build());
switchIns('globallife');
</script>
</body>
